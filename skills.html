<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Practical Skills — interactive step-by-step visual guides for every critical survival skill. Fire, knots, navigation, first aid, hunting, plants, construction.">
  <meta name="theme-color" content="#070a09">
  <title>Practical Skills — The Last Light Survival Guide</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* ── Page layout ───────────────────────────────────── */
    .main-content { margin-left: var(--sidebar-w); }
    @media (max-width: 900px) { .main-content { margin-left: 0; } }

    /* ── Progress banner ───────────────────────────────── */
    #progress-banner {
      background: var(--bg-0);
      border-bottom: 1px solid var(--border);
      padding: 0.55rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      position: sticky;
      top: var(--header-h);
      z-index: 90;
    }
    .pb-stat {
      font-size: 0.72rem;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .pb-stat strong { color: var(--text-0); }
    .pb-stat.pb-gap strong { color: var(--red); }
    .pb-divider { width: 1px; height: 16px; background: var(--border-hi); }
    .pb-btn {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--border-hi);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--font);
      transition: all var(--ease);
    }
    .pb-btn:hover { border-color: var(--amber-dim); color: var(--amber); }
    .pb-export-warn { font-size: 0.7rem; color: var(--orange); }

    /* ── Category tabs ─────────────────────────────────── */
    #category-tabs {
      display: flex;
      gap: 0.4rem;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding: var(--sp-md) 0 var(--sp-sm);
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      margin-bottom: var(--sp-md);
    }
    #category-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border-hi);
      background: var(--bg-2);
      color: var(--text-2);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--ease);
      font-family: var(--font);
      flex-shrink: 0;
    }
    .cat-tab svg { width: 14px; height: 14px; display: block; flex-shrink: 0; }
    .cat-tab:hover { border-color: var(--amber-dim); color: var(--text-1); }
    .cat-tab.active {
      background: var(--amber-dim);
      border-color: var(--amber);
      color: var(--amber-light);
    }

    /* ── Skills grid ───────────────────────────────────── */
    #skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--sp-md);
      margin-bottom: var(--sp-2xl);
    }

    .skill-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color var(--ease), transform var(--ease);
      cursor: pointer;
      position: relative;
    }
    .skill-card:hover {
      border-color: var(--border-hi);
      transform: translateY(-2px);
    }
    .skill-card-bar {
      height: 4px;
      width: 100%;
    }
    .skill-card-body { padding: var(--sp-md) var(--sp-lg); }
    .skill-card-top {
      display: flex;
      align-items: flex-start;
      gap: var(--sp-sm);
      margin-bottom: var(--sp-sm);
    }
    .skill-card-icon { display: flex; align-items: center; flex-shrink: 0; }
    .skill-card-icon svg { width: 24px; height: 24px; display: block; }
    .skill-card-title-block { flex: 1; min-width: 0; }
    .skill-card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-0);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .skill-card-subtitle { font-size: 0.75rem; color: var(--text-3); }
    .skill-card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: var(--sp-sm);
    }
    .badge {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      border: 1px solid;
    }
    .badge-beginner { background: rgba(75,158,106,.12); color: #6ecca8; border-color: rgba(75,158,106,.3); }
    .badge-intermediate { background: rgba(201,169,78,.12); color: var(--amber-light); border-color: rgba(201,169,78,.3); }
    .badge-advanced { background: rgba(200,72,72,.12); color: #ff9999; border-color: rgba(200,72,72,.3); }
    .diff-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; margin-right: 5px; vertical-align: middle; flex-shrink: 0; }
    .badge-practice { background: var(--bg-3); color: var(--text-2); border-color: var(--border-hi); }
    .badge-competency-none { background: var(--bg-3); color: var(--text-3); border-color: var(--border); }
    .badge-competency-getting-there { background: rgba(200,122,64,.12); color: var(--orange); border-color: rgba(200,122,64,.3); }
    .badge-competency-competent { background: rgba(75,158,106,.15); color: #6ecca8; border-color: rgba(75,158,106,.3); }
    .badge-competency-can-teach { background: rgba(201,169,78,.15); color: var(--amber-light); border-color: rgba(201,169,78,.3); }

    .skill-card-desc {
      font-size: 0.8rem;
      color: var(--text-2);
      line-height: 1.5;
      margin-bottom: var(--sp-md);
    }
    .skill-card-actions {
      display: flex;
      gap: var(--sp-sm);
      align-items: center;
    }
    .skill-card-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--amber-dim);
      background: rgba(201,169,78,.08);
      color: var(--amber);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      transition: all var(--ease);
      min-height: 44px;
    }
    .skill-card-btn:hover { background: rgba(201,169,78,.18); color: var(--amber-light); }

    /* Instructor notes collapse on card */
    .skill-card-notes {
      border-top: 1px solid var(--border);
      margin-top: var(--sp-sm);
      padding-top: var(--sp-sm);
    }
    .skill-card-notes-toggle {
      font-size: 0.72rem;
      color: var(--text-3);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--text-3);
      font-family: var(--font);
      padding: 0;
      transition: color var(--ease);
    }
    .skill-card-notes-toggle:hover { color: var(--amber); }
    .skill-card-notes-body {
      display: none;
      margin-top: var(--sp-sm);
      font-size: 0.78rem;
      color: var(--text-2);
      line-height: 1.6;
    }
    .skill-card-notes-body.open { display: block; }
    .skill-card-notes-body p { margin-bottom: var(--sp-xs); }

    /* ── Step-through modal ────────────────────────────── */
    #step-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: var(--bg-0);
      flex-direction: column;
      overflow: hidden;
    }
    #step-modal.open { display: flex; }

    .sm-topbar {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      padding: 0.6rem var(--sp-md);
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 54px;
    }
    .sm-close {
      background: none;
      border: none;
      color: var(--text-2);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
      transition: all var(--ease);
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .sm-close:hover { background: var(--bg-3); color: var(--text-0); }
    .sm-title {
      flex: 1;
      font-weight: 700;
      color: var(--text-0);
      font-size: 0.95rem;
      line-height: 1.2;
    }
    .sm-counter {
      font-size: 0.72rem;
      color: var(--text-3);
      white-space: nowrap;
      font-family: var(--mono);
    }
    .sm-print-btn {
      padding: 0.3rem 0.7rem;
      font-size: 0.72rem;
      border-radius: 4px;
      border: 1px solid var(--border-hi);
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      font-family: var(--font);
      transition: all var(--ease);
      min-height: 36px;
    }
    .sm-print-btn:hover { border-color: var(--amber-dim); color: var(--amber); }

    .sm-progress-bar {
      height: 3px;
      background: var(--border);
      flex-shrink: 0;
    }
    .sm-progress-fill {
      height: 100%;
      background: var(--amber);
      transition: width 0.3s ease;
    }

    .sm-body {
      flex: 1;
      overflow-y: auto;
      padding: var(--sp-lg) var(--sp-xl);
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
      -webkit-overflow-scrolling: touch;
    }
    @media (max-width: 600px) {
      .sm-body { padding: var(--sp-md); }
    }

    .sm-step-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--amber-light);
      margin-bottom: var(--sp-md);
      line-height: 1.2;
    }
    .sm-svg-wrap {
      margin: var(--sp-md) 0;
      text-align: center;
    }
    .sm-svg-wrap svg {
      width: 100%;
      max-width: 480px;
      height: auto;
      color: var(--amber);
    }
    .sm-instruction {
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--text-0);
      margin-bottom: var(--sp-md);
    }
    .sm-warning {
      background: rgba(200,72,72,.1);
      border-left: 4px solid var(--red);
      border-radius: 0 8px 8px 0;
      padding: var(--sp-sm) var(--sp-md);
      margin: var(--sp-md) 0;
      font-size: 0.9rem;
      color: #ff9999;
    }
    .sm-tip {
      background: rgba(201,169,78,.08);
      border-left: 4px solid var(--amber-dim);
      border-radius: 0 8px 8px 0;
      padding: var(--sp-sm) var(--sp-md);
      margin: var(--sp-md) 0;
      font-size: 0.9rem;
      color: var(--amber-light);
    }
    .sm-tip strong, .sm-warning strong {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }

    /* Timer widget */
    .sm-timer {
      background: var(--bg-2);
      border: 1px solid var(--border-hi);
      border-radius: 12px;
      padding: var(--sp-lg);
      margin: var(--sp-md) 0;
      text-align: center;
    }
    .sm-timer-display {
      font-size: 3rem;
      font-weight: 800;
      font-family: var(--mono);
      color: var(--amber-light);
      letter-spacing: .04em;
      line-height: 1;
      margin-bottom: var(--sp-md);
    }
    .sm-timer-display.done { color: var(--green); }
    .sm-timer-display.running { animation: timer-pulse 1s ease-in-out infinite; }
    @keyframes timer-pulse { 0%,100%{opacity:1} 50%{opacity:.7} }
    .sm-timer-label { font-size: 0.75rem; color: var(--text-2); margin-bottom: var(--sp-sm); text-transform: uppercase; letter-spacing: .08em; }
    .sm-timer-btns { display: flex; gap: var(--sp-sm); justify-content: center; }
    .sm-timer-btn {
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      border: 1px solid var(--border-hi);
      background: var(--bg-3);
      color: var(--text-0);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all var(--ease);
      min-height: 44px;
    }
    .sm-timer-btn.start { border-color: var(--green); color: #6ecca8; }
    .sm-timer-btn.start:hover { background: rgba(75,158,106,.2); }
    .sm-timer-btn:hover { border-color: var(--border-hi); background: var(--bg-4); }

    /* CPR metronome */
    .sm-metronome {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-sm);
      padding: var(--sp-lg);
      background: var(--bg-2);
      border: 1px solid var(--border-hi);
      border-radius: 12px;
      margin: var(--sp-md) 0;
    }
    .sm-metro-pulse {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--red-dim);
      border: 3px solid var(--red);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 800; color: #ff9999;
      transition: transform .1s, background .1s;
    }
    .sm-metro-pulse.beat {
      background: var(--red);
      transform: scale(1.2);
    }
    .sm-metro-label { font-size: 0.8rem; color: var(--text-2); }
    .sm-metro-count { font-size: 1.4rem; font-weight: 800; color: var(--amber-light); font-family: var(--mono); }

    /* Completion slide */
    .sm-complete {
      text-align: center;
      padding: var(--sp-xl) 0;
    }
    .sm-complete-icon { font-size: 3rem; margin-bottom: var(--sp-md); }
    .sm-complete h2 { color: var(--amber-light); margin-bottom: var(--sp-md); }
    .sm-complete-actions {
      display: flex;
      flex-direction: column;
      gap: var(--sp-sm);
      max-width: 340px;
      margin: var(--sp-lg) auto;
    }
    .sm-action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: 1px solid;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      transition: all var(--ease);
      min-height: 48px;
    }
    .sm-action-btn.primary {
      background: rgba(201,169,78,.12);
      border-color: var(--amber-dim);
      color: var(--amber-light);
    }
    .sm-action-btn.primary:hover { background: rgba(201,169,78,.25); }
    .sm-action-btn.secondary {
      background: rgba(75,158,106,.1);
      border-color: var(--green-dim);
      color: #6ecca8;
    }
    .sm-action-btn.secondary:hover { background: rgba(75,158,106,.2); }
    .sm-action-btn.ghost {
      background: transparent;
      border-color: var(--border-hi);
      color: var(--text-2);
    }
    .sm-action-btn.ghost:hover { border-color: var(--amber-dim); color: var(--text-1); }

    .sm-practice-count {
      font-size: 1.1rem;
      color: var(--amber);
      font-weight: 700;
      margin: var(--sp-sm) 0;
    }

    /* Competency rating */
    .sm-competency {
      background: var(--bg-2);
      border: 1px solid var(--border-hi);
      border-radius: 10px;
      padding: var(--sp-md);
      margin: var(--sp-md) 0;
      text-align: left;
    }
    .sm-competency-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-3);
      margin-bottom: var(--sp-sm);
    }
    .sm-competency-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-sm);
    }
    .sm-comp-opt {
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border-hi);
      background: var(--bg-3);
      color: var(--text-1);
      font-size: 0.8rem;
      cursor: pointer;
      font-family: var(--font);
      transition: all var(--ease);
      text-align: center;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sm-comp-opt:hover { border-color: var(--amber-dim); color: var(--amber); }
    .sm-comp-opt.selected { border-color: var(--amber); background: rgba(201,169,78,.15); color: var(--amber-light); }

    /* Instructor notes in modal */
    .sm-instr-notes {
      margin-top: var(--sp-lg);
      border-top: 1px solid var(--border);
      padding-top: var(--sp-md);
    }
    .sm-instr-notes-toggle {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 0.78rem;
      cursor: pointer;
      font-family: var(--font);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0;
    }
    .sm-instr-notes-toggle:hover { color: var(--amber); }
    .sm-instr-notes-body { display: none; margin-top: var(--sp-sm); }
    .sm-instr-notes-body.open { display: block; }
    .sm-instr-notes-body textarea {
      width: 100%;
      min-height: 80px;
      background: var(--bg-3);
      border: 1px solid var(--border-hi);
      border-radius: 6px;
      padding: var(--sp-sm);
      color: var(--text-0);
      font-family: var(--font);
      font-size: 0.85rem;
      resize: vertical;
      outline: none;
    }
    .sm-instr-notes-body textarea:focus { border-color: var(--amber-dim); }

    /* Bottom nav */
    .sm-bottombar {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      padding: var(--sp-md) var(--sp-lg);
      background: var(--bg-1);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sm-nav-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border-hi);
      background: var(--bg-2);
      color: var(--text-1);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      transition: all var(--ease);
      min-height: 52px;
    }
    .sm-nav-btn:hover { border-color: var(--amber-dim); color: var(--amber); }
    .sm-nav-btn:disabled { opacity: .3; cursor: default; }
    .sm-nav-btn:disabled:hover { border-color: var(--border-hi); color: var(--text-1); }
    .sm-nav-btn.next { border-color: var(--amber-dim); color: var(--amber); background: rgba(201,169,78,.08); }
    .sm-nav-btn.next:hover { background: rgba(201,169,78,.18); color: var(--amber-light); }

    /* ── Print styles ──────────────────────────────────── */
    @media print {
      #sidebar, .site-header, #progress-banner, #category-tabs,
      #step-modal .sm-topbar, #step-modal .sm-bottombar,
      #step-modal .sm-progress-bar, .sm-timer-btns, .sm-nav-btn,
      .sm-complete-actions, .sm-metronome .sm-metro-btns,
      #step-modal .sm-print-btn, .sm-close { display: none !important; }

      .main-content { margin: 0 !important; }
      #step-modal { display: block !important; position: static !important; overflow: visible; }
      #step-modal .sm-body { padding: 0; max-width: 100%; overflow: visible; }
      body { background: white; color: #111; }
      .sm-step-title { color: #111 !important; }
      .sm-instruction { color: #333 !important; }
      .sm-svg-wrap svg { filter: invert(1); }
      .sm-timer { display: none; }

      .print-all-steps .print-step {
        page-break-inside: avoid;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .print-step h3 { font-size: 1rem; color: #111; margin-bottom: .5rem; }
      .print-step p { color: #333; font-size: .9rem; }
    }

    /* ── Misc ──────────────────────────────────────────── */
    .section-intro {
      color: var(--text-1);
      font-size: 0.95rem;
      margin-bottom: var(--sp-lg);
      max-width: 640px;
      line-height: 1.7;
    }
    .skills-count {
      font-size: 0.75rem;
      color: var(--text-3);
      margin-bottom: var(--sp-md);
      font-family: var(--mono);
    }

    /* Category colour bars */
    .cat-fire { background: linear-gradient(90deg, #c84828, #c87a40); }
    .cat-knots { background: linear-gradient(90deg, #7a6430, #c9a94e); }
    .cat-navigation { background: linear-gradient(90deg, #28486a, #4a80b5); }
    .cat-first-aid { background: linear-gradient(90deg, #6e2828, #c84848); }
    .cat-hunting { background: linear-gradient(90deg, #2a5a3c, #4b9e6a); }
    .cat-plants { background: linear-gradient(90deg, #2a5a3c, #6ecca8); }
    .cat-construction { background: linear-gradient(90deg, #5a4a2a, #c87a40); }

    /* Empty state */
    .skills-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: var(--sp-2xl);
      color: var(--text-3);
    }
  </style>
</head>
<body>

<div id="overlay" class="overlay"></div>
<nav id="sidebar" class="sidebar" aria-label="Main navigation"></nav>

<header class="site-header">
  <button id="menu-toggle" class="btn-icon" aria-label="Toggle navigation">☰</button>
  <div class="header-breadcrumb">
    <a href="index.html" class="crumb-parent">Last Light Guide</a>
    <span class="page-title">Practical Skills</span>
  </div>
  <div class="header-actions">
